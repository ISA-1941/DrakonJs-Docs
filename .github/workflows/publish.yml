name: Publish Antora site to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Antora
        run: npm install @antora/cli@3.1.2 @antora/site-generator@3.1.2

      - name: Generate site
        run: npx antora antora-playbook.yml --stacktrace

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
