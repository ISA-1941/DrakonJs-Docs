<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800">
<!-- Белый фон -->
<rect width="1000" height="800" fill="#ffffff"/>

<g id="linked-list-bw" font-family="Arial, sans-serif">
<!-- Надпись Head и стрелка -->
<text x="50" y="30" font-size="16" fill="#000000">Head</text>
<path d="M 60 40 L 60 75" stroke="#000000" stroke-width="2" fill="none"/>
<path d="M 60 75 L 55 67 M 60 75 L 65 67" stroke="#000000" stroke-width="2" fill="none"/>

<!-- Верхняя цепочка узлов (визуальное представление) -->
<g id="nodes-chain" stroke="#000000" stroke-width="2">
  <!-- Узел 1 -->
  <rect x="20" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="50" y="105" text-anchor="middle" font-size="14" fill="#000000">11</text>
  <rect x="80" y="80" width="80" height="40" fill="#ffffff"/>
  <text x="120" y="105" text-anchor="middle" font-size="14" fill="#000000">Next</text>
  <path d="M 140 100 L 180 100" fill="none"/>
  <path d="M 180 100 L 172 95 M 180 100 L 172 105" fill="none"/>

  <!-- Узел 2 -->
  <rect x="200" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="230" y="105" text-anchor="middle" font-size="14" fill="#000000">42</text>
  <rect x="260" y="80" width="80" height="40" fill="#ffffff"/>
  <text x="300" y="105" text-anchor="middle" font-size="14" fill="#000000">Next</text>
  <path d="M 320 100 L 360 100" fill="none"/>
  <path d="M 360 100 L 352 95 M 360 100 L 352 105" fill="none"/>

  <!-- Узел 3 -->
  <rect x="380" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="410" y="105" text-anchor="middle" font-size="14" fill="#000000">17</text>
  <rect x="440" y="80" width="80" height="40" fill="#ffffff"/>
  <text x="480" y="105" text-anchor="middle" font-size="14" fill="#000000">Next</text>
  <path d="M 500 100 L 540 100" fill="none"/>
  <path d="M 540 100 L 532 95 M 540 100 L 532 105" fill="none"/>

  <!-- Узел 4 -->
  <rect x="560" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="590" y="105" text-anchor="middle" font-size="14" fill="#000000">23</text>
  <rect x="620" y="80" width="80" height="40" fill="#ffffff"/>
  <text x="660" y="105" text-anchor="middle" font-size="14" fill="#000000">Next</text>
  <path d="M 680 100 L 720 100" fill="none"/>
  <path d="M 720 100 L 712 95 M 720 100 L 712 105" fill="none"/>

  <!-- Узел 5 -->
  <rect x="740" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="770" y="105" text-anchor="middle" font-size="14" fill="#000000">19</text>
  <rect x="800" y="80" width="80" height="40" fill="#ffffff"/>
  <text x="840" y="105" text-anchor="middle" font-size="14" fill="#000000">Next</text>
  <path d="M 860 100 L 900 100" fill="none"/>
  <path d="M 900 100 L 892 95 M 900 100 L 892 105" fill="none"/>

  <!-- Последний узел (NULL) -->
  <rect x="920" y="80" width="60" height="40" fill="#ffffff"/>
  <text x="950" y="105" text-anchor="middle" font-size="14" fill="#000000">33</text>
  <rect x="980" y="80" width="20" height="40" fill="#ffffff"/>
  <line x1="980" y1="120" x2="1000" y2="80" />
</g>

<!-- Таблица распределения памяти -->
<g id="memory-table" transform="translate(350, 160)" stroke="#000000" stroke-width="1.5">
  <rect x="0" y="0" width="400" height="480" fill="#ffffff" stroke-width="2"/>
  
  <!-- Заголовки или строки данных -->
  <g font-size="14" fill="#000000" stroke="none" text-anchor="middle">
    <text x="100" y="30">14000000761100</text> <text x="300" y="30">11</text>
    <line x1="0" y1="45" x2="400" y2="45" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="70">14000000761120</text> <text x="300" y="70">14000000761140</text>
    <line x1="0" y1="85" x2="400" y2="85" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="110">14000000761140</text> <text x="300" y="110">42</text>
    <line x1="0" y1="125" x2="400" y2="125" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="150">14000000761160</text> <text x="300" y="150">14000000761180</text>
    <line x1="0" y1="165" x2="400" y2="165" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="190">14000000761180</text> <text x="300" y="190">17</text>
    <line x1="0" y1="205" x2="400" y2="205" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="230">14000000761200</text> <text x="300" y="230">14000000761220</text>
    <line x1="0" y1="245" x2="400" y2="245" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="270">14000000761220</text> <text x="300" y="270">23</text>
    <line x1="0" y1="285" x2="400" y2="285" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="310">14000000761240</text> <text x="300" y="310">14000000761260</text>
    <line x1="0" y1="325" x2="400" y2="325" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="350">14000000761260</text> <text x="300" y="350">19</text>
    <line x1="0" y1="365" x2="400" y2="365" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="390">14000000761280</text> <text x="300" y="390">14000000761280</text>
    <line x1="0" y1="405" x2="400" y2="405" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="430">14000000761300</text> <text x="300" y="430">33</text>
    <line x1="0" y1="445" x2="400" y2="445" stroke="#000000" stroke-width="1"/>
    
    <text x="100" y="470">14000000761320</text> <text x="300" y="470">14000000761320</text>
  </g>
  
  <!-- Вертикальная разделительная линия таблицы -->
  <line x1="200" y1="0" x2="200" y2="480" stroke="#000000" stroke-width="1.5"/>
</g>


</g>
</svg>