<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<!-- Фон страницы -->
<rect width="800" height="600" fill="#ffffff"/>

<g id="stack-illustration" font-family="Arial, sans-serif">
<!-- Левая часть: PUSH -->
<text x="100" y="80" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">PUSH</text>
<rect x="40" y="100" width="120" height="40" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="100" y="125" font-size="14" fill="#000000" text-anchor="middle">Item</text>
<text x="100" y="170" font-size="18" fill="#000000" text-anchor="middle">Last Out</text>

<!-- Изогнутая стрелка входа (PUSH) -->

<!-- Путь: от правого края блока Item (160, 120) к верхней ячейке стека (280, 185) -->

<path d="M 160 120 Q 220 120 270 180" stroke="#000000" stroke-width="2" fill="none"/>
<path d="M 270 180 L 260 176 M 270 180 L 268 170" stroke="#000000" stroke-width="2" fill="none"/>

<!-- Центральная часть: Стек -->

<g id="stack-frames">

<!-- Ячейки стека -->

<!-- 1-я ячейка (верхняя) -->

<rect x="280" y="170" width="160" height="50" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="360" y="200" font-size="14" fill="#000000" text-anchor="middle">Item</text>

<!-- 2-я ячейка -->

<rect x="280" y="230" width="160" height="50" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="360" y="260" font-size="14" fill="#000000" text-anchor="middle">Item</text>

<!-- 3-я ячейка (средняя) -->

<rect x="280" y="290" width="160" height="50" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="360" y="320" font-size="14" fill="#000000" text-anchor="middle">............</text>

<!-- 4-я ячейка -->

<rect x="280" y="350" width="160" height="50" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="360" y="380" font-size="14" fill="#000000" text-anchor="middle">Item</text>

<!-- 5-я ячейка (нижняя) -->

<rect x="280" y="410" width="160" height="50" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="360" y="440" font-size="14" fill="#000000" text-anchor="middle">Item</text>
</g>

<!-- Изогнутая стрелка выхода (POP) -->

<!-- Путь: от верхней ячейки стека (440, 185) к левому краю блока POP (560, 120) -->

<path d="M 440 180 Q 500 120 560 120" stroke="#000000" stroke-width="2" fill="none"/>
<path d="M 560 120 L 550 116 M 560 120 L 552 130" stroke="#000000" stroke-width="2" fill="none"/>

<!-- Правая часть: POP -->

<text x="620" y="80" font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">POP</text>
<rect x="560" y="100" width="120" height="40" stroke="#000000" stroke-width="2" fill="#ffffff"/>
<text x="620" y="125" font-size="14" fill="#000000" text-anchor="middle">Item</text>
<text x="620" y="170" font-size="18" fill="#000000" text-anchor="middle">First In</text>

</g>
</svg>