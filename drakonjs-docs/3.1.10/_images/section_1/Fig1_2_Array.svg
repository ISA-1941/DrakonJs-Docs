<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
<!-- Принудительный белый фон -->
<rect width="800" height="400" fill="#ffffff"/>

<g id="array-illustration" font-family="'Times New Roman', Times, serif" fill="#000000" stroke="#000000" stroke-width="0">
<!-- Заголовок схемы -->
<text x="400" y="50" text-anchor="middle" font-size="20" font-weight="bold" stroke="none">Logical View of an Array</text>

<!-- Отрисовка ячеек массива -->
<g id="cells" stroke-width="2" fill="#ffffff">
  <!-- Индексы над массивом -->
  <g font-size="14" stroke="none" text-anchor="middle" fill="#000000">
    <text x="100" y="110">0</text>
    <text x="180" y="110">1</text>
    <text x="260" y="110">2</text>
    <text x="340" y="110">3</text>
    <text x="420" y="110">4</text>
    <text x="500" y="110">5</text>
    <text x="580" y="110">6</text>
    <text x="660" y="110">7</text>
  </g>

  <!-- Прямоугольники ячеек -->
  <rect x="60" y="120" width="80" height="60"/>
  <rect x="140" y="120" width="80" height="60"/>
  <rect x="220" y="120" width="80" height="60"/>
  <rect x="300" y="120" width="80" height="60"/>
  <rect x="380" y="120" width="80" height="60"/>
  <rect x="460" y="120" width="80" height="60"/>
  <rect x="540" y="120" width="80" height="60"/>
  <rect x="620" y="120" width="80" height="60"/>

  <!-- Данные внутри ячеек -->
  <g font-size="18" stroke="none" text-anchor="middle" fill="#000000">
    <text x="100" y="155">11</text>
    <text x="180" y="155">42</text>
    <text x="260" y="155">17</text>
    <text x="340" y="155">23</text>
    <text x="420" y="155">19</text>
    <text x="500" y="155">33</text>
    <text x="580" y="155">08</text>
    <text x="660" y="155">54</text>
  </g>
</g>

<!-- Отрисовка адресов памяти под массивом -->
<g id="addresses" font-size="12" stroke="none" text-anchor="middle" fill="#000000">
  <text x="100" y="205">0x761100</text>
  <text x="180" y="205">0x761104</text>
  <text x="260" y="205">0x761108</text>
  <text x="340" y="205">0x76110C</text>
  <text x="420" y="205">0x761110</text>
  <text x="500" y="205">0x761114</text>
  <text x="580" y="205">0x761118</text>
  <text x="660" y="205">0x76111C</text>
</g>

<!-- Пояснения -->
<text x="400" y="260" text-anchor="middle" font-size="14" font-style="italic" stroke="none">Each element is accessed by an index and takes 4 bytes in memory.</text>


</g>
</svg>